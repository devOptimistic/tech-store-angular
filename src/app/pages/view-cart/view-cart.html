@if (store.cartItems().length > 0){
    <section class="rounded-[28px] border border-slate-200 bg-white p-5 shadow-soft sm:p-7">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
            <h1 class="mt-3 text-3xl font-black tracking-tight text-slate-950 sm:text-4xl">Your Cart</h1>
            <p class="mt-2 max-w-2xl text-sm leading-7 text-slate-600 sm:text-base">Review your selected products,
                update quantities, apply discount codes, and continue to secure checkout.</p>
        </div>
        <a routerLink="/product/all"
            class="inline-flex rounded-2xl border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">Continue
            Shopping</a>
    </div>
</section>

<section class="mt-6 grid gap-6 xl:grid-cols-[1fr_360px]">
    <div class="space-y-4">
        <app-list-cart-items />

        <app-promo-code />
    </div>

    <app-summarize-order />
</section>

<app-recommended-products [category]="store.cartItems()[0].product.category"/>
} @else {
    <app-empty-cart />
}

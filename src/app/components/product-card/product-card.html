<article
    class="group rounded-[28px] border border-slate-200 bg-white p-4 shadow-soft transition hover:-translate-y-1 hover:shadow-card sm:p-5">
    <button 
        (click)="toggleWishlist(product())"
        class="absolute right-4 top-4 z-10 flex h-10 w-10 cursor-pointer items-center justify-center rounded-full bg-white/90 shadow-md backdrop-blur-sm transition-all hover:scale-110 active:scale-95">
        <svg 
            class="h-5 w-5 transition-colors"
            [class.fill-red-500]="isInWishlist()"
            [class.stroke-red-500]="isInWishlist()"
            [class.fill-none]="!isInWishlist()"
            [class.stroke-slate-400]="!isInWishlist()"
            fill="none" 
            stroke="currentColor" 
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
        </svg>
    </button>
    <div class="rounded-[24px] bg-slate-50 p-7 text-center text-6xl">
        <!-- <img [src]="product()?.imageUrls![0]" alt=""> -->
        <img src="https://i.guim.co.uk/img/media/18badfc0b64b09f917fd14bbe47d73fd92feeb27/189_335_5080_3048/master/5080.jpg?width=620&dpr=1&s=none&crop=none"
            alt="">
    </div>
    <div class="mt-5 flex items-start justify-between gap-3">
        <div class="cursor-pointer" routerLink="/product/{{product()?.id}}">
            <h3 class="text-lg font-bold text-slate-900">{{product()?.name}}</h3>
            <p class="mt-1 text-sm text-slate-500">{{product()?.shortDescription}}</p>
        </div>
        <span class="rounded-full bg-green-50 px-3 py-1 text-xs font-bold text-green-600">New</span>
    </div>
    <div class="mt-3 flex items-center gap-1 text-sm text-amber-400">
        {{'★'.repeat(product()?.rating!) }}{{'☆'.repeat(roundUp(5 - product()?.rating!)) }}
        <span class="ml-1 text-slate-500">({{product()?.reviewCount}})</span>
    </div>

    @if(product()?.inStock){
    <div class="mt-5 flex items-center justify-between">
        <span class="text-xl font-black text-blue-600">${{product()?.price}}</span>
        <button class="rounded-2xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white cursor-pointer">Add to
            Cart</button>
    </div>
    <p class="mt-3 text-xs text-green-600">✓ In Stock</p>
    } @else {
    <p class="mt-3 text-xs text-gray-600">Out of Stock</p>
    }

</article>
